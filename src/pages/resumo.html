<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <meta author="Emerson Moron Rosa, Italo Araujo Santos, Daniel de Lima Pereira">
    <title>Resumo da Viagem</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="resumo-page">
         <main>

        <section id="resumo">
            <h1>Resumo da Viagem</h1>

            <p>
                Sua viagem saindo de <span id="origem"></span>
                e indo para <span id="destino"></span>,
                com partida em <span id="data-inicio"></span>
                e retorno em <span id="data-fim"></span>.
            </p>

            <p>
                Tem previsão de <span id="previsao"></span> durante a viagem.
            </p>
        </section>

        <section id="historico">
            <h2>Histórico de Viagens</h2>

            <!-- A função printHistory() preencherá esta div -->
            <div id="history"></div>
        </section>

        <button id="btn-nova_pesquisa"
                onclick="window.location.href='page2.html'">
            Nova Pesquisa
        </button>

    </main>

     <script src="../app/main.js"></script>
</body>
</html>
